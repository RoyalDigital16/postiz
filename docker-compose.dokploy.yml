# =============================================================================
# Postiz — Docker Compose for Dokploy + Traefik (HTTPS)
# =============================================================================
#
# HOW TO USE WITH DOKPLOY:
# 1. Create a new Compose app in Dokploy, paste this file as docker-compose.yml
# 2. Add the DOMAIN variable in the Environment tab (e.g. DOMAIN=postiz.example.com)
# 3. Add a JWT_SECRET (e.g. output of: openssl rand -hex 32)
# 4. Deploy — the temporal-dynamicconfig-init service seeds the config automatically
#
# DNS: Point A records for postiz.yourdomain.com and temporal.yourdomain.com
#      to your Dokploy server IP.
# =============================================================================

services:
  # ── Postiz Application ────────────────────────────────────────────────────
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    restart: always
    environment:
      # === Required Settings (domain-driven) ===
      MAIN_URL: "https://${DOMAIN}"
      FRONTEND_URL: "https://${DOMAIN}"
      NEXT_PUBLIC_BACKEND_URL: "https://${DOMAIN}/api"
      JWT_SECRET: "${JWT_SECRET}"
      DATABASE_URL: "postgresql://postiz-user:postiz-password@postiz-postgres:5432/postiz-db-local"
      REDIS_URL: "redis://postiz-redis:6379"
      BACKEND_INTERNAL_URL: "http://localhost:3000"
      TEMPORAL_ADDRESS: "temporal:7233"
      IS_GENERAL: "true"
      DISABLE_REGISTRATION: "false"
      RUN_CRON: "true"

      # === Storage Settings ===
      STORAGE_PROVIDER: "local"
      UPLOAD_DIRECTORY: "/uploads"
      NEXT_PUBLIC_UPLOAD_DIRECTORY: "/uploads"

      # === Social Media API Keys (fill via Dokploy env vars) ===
      X_API_KEY: "${X_API_KEY:-}"
      X_API_SECRET: "${X_API_SECRET:-}"
      LINKEDIN_CLIENT_ID: "${LINKEDIN_CLIENT_ID:-}"
      LINKEDIN_CLIENT_SECRET: "${LINKEDIN_CLIENT_SECRET:-}"
      REDDIT_CLIENT_ID: "${REDDIT_CLIENT_ID:-}"
      REDDIT_CLIENT_SECRET: "${REDDIT_CLIENT_SECRET:-}"
      GITHUB_CLIENT_ID: "${GITHUB_CLIENT_ID:-}"
      GITHUB_CLIENT_SECRET: "${GITHUB_CLIENT_SECRET:-}"
      BEEHIIVE_API_KEY: "${BEEHIIVE_API_KEY:-}"
      BEEHIIVE_PUBLICATION_ID: "${BEEHIIVE_PUBLICATION_ID:-}"
      THREADS_APP_ID: "${THREADS_APP_ID:-}"
      THREADS_APP_SECRET: "${THREADS_APP_SECRET:-}"
      FACEBOOK_APP_ID: "${FACEBOOK_APP_ID:-}"
      FACEBOOK_APP_SECRET: "${FACEBOOK_APP_SECRET:-}"
      YOUTUBE_CLIENT_ID: "${YOUTUBE_CLIENT_ID:-}"
      YOUTUBE_CLIENT_SECRET: "${YOUTUBE_CLIENT_SECRET:-}"
      TIKTOK_CLIENT_ID: "${TIKTOK_CLIENT_ID:-}"
      TIKTOK_CLIENT_SECRET: "${TIKTOK_CLIENT_SECRET:-}"
      PINTEREST_CLIENT_ID: "${PINTEREST_CLIENT_ID:-}"
      PINTEREST_CLIENT_SECRET: "${PINTEREST_CLIENT_SECRET:-}"
      DRIBBBLE_CLIENT_ID: "${DRIBBBLE_CLIENT_ID:-}"
      DRIBBBLE_CLIENT_SECRET: "${DRIBBBLE_CLIENT_SECRET:-}"
      DISCORD_CLIENT_ID: "${DISCORD_CLIENT_ID:-}"
      DISCORD_CLIENT_SECRET: "${DISCORD_CLIENT_SECRET:-}"
      DISCORD_BOT_TOKEN_ID: "${DISCORD_BOT_TOKEN_ID:-}"
      SLACK_ID: "${SLACK_ID:-}"
      SLACK_SECRET: "${SLACK_SECRET:-}"
      SLACK_SIGNING_SECRET: "${SLACK_SIGNING_SECRET:-}"
      MASTODON_URL: "https://mastodon.social"
      MASTODON_CLIENT_ID: "${MASTODON_CLIENT_ID:-}"
      MASTODON_CLIENT_SECRET: "${MASTODON_CLIENT_SECRET:-}"

      # === Misc Settings ===
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      NEXT_PUBLIC_DISCORD_SUPPORT: "${NEXT_PUBLIC_DISCORD_SUPPORT:-}"
      NEXT_PUBLIC_POLOTNO: "${NEXT_PUBLIC_POLOTNO:-}"
      API_LIMIT: 30

      # === Payment / Stripe ===
      FEE_AMOUNT: 0.05
      STRIPE_PUBLISHABLE_KEY: "${STRIPE_PUBLISHABLE_KEY:-}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
      STRIPE_SIGNING_KEY: "${STRIPE_SIGNING_KEY:-}"
      STRIPE_SIGNING_KEY_CONNECT: "${STRIPE_SIGNING_KEY_CONNECT:-}"

      # === Developer Settings ===
      NX_ADD_PLUGINS: false

    volumes:
      - postiz-config:/config/
      - postiz-uploads:/uploads/
    expose:
      - "5000"
    networks:
      - postiz-network
      - temporal-network
      - dokploy-network
    healthcheck:
      test: ["CMD", "node", "-e", "const r=require('http').get('http://localhost:5000/',res=>process.exit(res.statusCode<500?0:1));r.on('error',()=>process.exit(1));r.setTimeout(4000,()=>{r.destroy();process.exit(1)})"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    depends_on:
      postiz-postgres:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.postiz.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.postiz.entrypoints=websecure"
      - "traefik.http.routers.postiz.tls.certResolver=letsencrypt"
      - "traefik.http.services.postiz.loadbalancer.server.port=5000"

  # ── PostgreSQL (Postiz) ────────────────────────────────────────────────────
  postiz-postgres:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: postiz-password
      POSTGRES_USER: postiz-user
      POSTGRES_DB: postiz-db-local
    volumes:
      - postgres-volume:/var/lib/postgresql/data
    networks:
      - postiz-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postiz-user -d postiz-db-local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ──────────────────────────────────────────────────────────────────
  postiz-redis:
    image: redis:7.2
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    volumes:
      - postiz-redis-data:/data
    networks:
      - postiz-network

  # ═══════════════════════════════════════════════════════════════════════════
  # Temporal Stack
  # ═══════════════════════════════════════════════════════════════════════════
  temporal-elasticsearch:
    image: elasticsearch:7.17.27
    restart: always
    environment:
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=512mb
      - cluster.routing.allocation.disk.watermark.high=256mb
      - cluster.routing.allocation.disk.watermark.flood_stage=128mb
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.security.enabled=false
    networks:
      - temporal-network
    expose:
      - 9200
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS \"http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s\" || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    volumes:
      - temporal-elasticsearch-data:/usr/share/elasticsearch/data

  temporal-postgresql:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
    networks:
      - temporal-network
    expose:
      - 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - temporal-postgres-data:/var/lib/postgresql/data

  # ── Seeds the dynamicconfig volume (runs once, then exits) ──────────────
  temporal-dynamicconfig-init:
    image: alpine:3.20
    volumes:
      - temporal-dynamicconfig:/data
    command:
      - sh
      - -c
      - |
        if [ ! -f /data/development-sql.yaml ]; then
          echo "Seeding temporal dynamicconfig..."
          cat > /data/development-sql.yaml << 'YAMLEOF'
        limit.maxIDLength:
          - value: 255
            constraints: {}
        system.forceSearchAttributesCacheRefreshOnRead:
          - value: true
            constraints: {}
        YAMLEOF
          echo "Done."
        else
          echo "Dynamic config already exists, skipping."
        fi
    networks:
      - temporal-network

  temporal:
    image: temporalio/auto-setup:1.28.1
    restart: always
    expose:
      - 7233
    depends_on:
      temporal-dynamicconfig-init:
        condition: service_completed_successfully
      temporal-postgresql:
        condition: service_healthy
      temporal-elasticsearch:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgresql
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
      - ENABLE_ES=true
      - ES_SEEDS=temporal-elasticsearch
      - ES_VERSION=v7
      - TEMPORAL_NAMESPACE=default
      - BIND_ON_IP=0.0.0.0
    networks:
      - temporal-network
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health --address temporal:7233"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - temporal-dynamicconfig:/etc/temporal/config/dynamicconfig

  temporal-admin-tools:
    image: temporalio/admin-tools:1.28.1-tctl-1.18.4-cli-1.4.1
    restart: on-failure
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    networks:
      - temporal-network
    depends_on:
      temporal:
        condition: service_healthy
    command: ["sleep", "infinity"]

  # ── Temporal UI (optional, exposed via Traefik on a subdomain) ────────────
  temporal-ui:
    image: temporalio/ui:2.34.0
    restart: always
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=https://${TEMPORAL_UI_DOMAIN:-temporal.${DOMAIN}}
    networks:
      - temporal-network
      - dokploy-network
    expose:
      - 8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      temporal:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.postiz-temporal-ui.rule=Host(`${TEMPORAL_UI_DOMAIN:-temporal.${DOMAIN}}`)"
      - "traefik.http.routers.postiz-temporal-ui.entrypoints=websecure"
      - "traefik.http.routers.postiz-temporal-ui.tls.certResolver=letsencrypt"
      - "traefik.http.services.postiz-temporal-ui.loadbalancer.server.port=8080"

# ═══════════════════════════════════════════════════════════════════════════
# Volumes (named — compatible with Dokploy Volume Backups)
# ═══════════════════════════════════════════════════════════════════════════
volumes:
  postgres-volume:
  postiz-redis-data:
  postiz-config:
  postiz-uploads:
  temporal-postgres-data:
  temporal-elasticsearch-data:
  temporal-dynamicconfig:

# ═══════════════════════════════════════════════════════════════════════════
# Networks
# ═══════════════════════════════════════════════════════════════════════════
networks:
  postiz-network:
    driver: bridge
  temporal-network:
    driver: bridge
  dokploy-network:
    external: true
